<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>%100 FEN</title>
    <script>
        // Sayfa açılır açılmaz Google Sites sitene yönlendirme yapar
        window.location.href = "https://sites.google.com/view/100-fen/ana-sayfa";
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loading-box {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h3 { color: #333; margin: 0 0 8px 0; }
        p { color: #666; margin: 0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loading-box">
        <div class="spinner"></div>
        <h3>%100 FEN</h3>
        <p>Web sitesine yönlendiriliyorsunuz, lütfen bekleyin...</p>
    </div>

</body>
</html>
